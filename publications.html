<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publications — iWAN Research Group</title>
<meta name="description" content="Live, automatically updated list of iWAN Research Group publications, aggregated from OpenAlex.">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a class="brand" href="index.html">
      <img class="brand__logo" src="assets/img/iwan-logo.png" alt="iWAN — إيوان" onerror="this.onerror=null;this.src='assets/img/iwan-logo.svg'">
      <span><span class="brand__name">iWAN</span><span class="brand__sub" data-i18n="brand.sub">Research Group</span></span>
    </a>
    <div class="nav__links">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="index.html#research" data-i18n="nav.research">Research</a>
      <a href="publications.html" data-i18n="nav.publications">Publications</a>
      <a href="members.html" data-i18n="nav.members">Members</a>
      <a href="resources.html" data-i18n="nav.resources">Resources</a>
    </div>
    <button class="lang-toggle" data-lang-toggle aria-label="Switch language">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
      <span class="lang-toggle__ar">العربية</span>
    </button>
    <button class="nav__burger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
  </div>
</nav>

<section class="pagehead">
  <div class="wrap">
    <span class="eyebrow reveal" data-i18n="pub.eyebrow">Open research</span>
    <h1 class="reveal" data-i18n="pub.title">Publications</h1>
    <p class="section-lead reveal" data-i18n="pub.lead">A live, automatically updated record of the group's research output.</p>
    <p class="pubmeta reveal" id="pub-updated" style="margin-top:10px"></p>
  </div>
</section>

<section class="section" style="padding-top:24px">
  <div class="wrap">
    <div class="pubbar reveal">
      <label class="pubsearch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="pub-search" type="search" data-i18n-attr="placeholder:pub.search" placeholder="Search…">
      </label>
      <div class="pubfilters">
        <button class="chip is-on" data-filter="all" data-i18n="pub.f.all">All</button>
        <button class="chip" data-filter="journal" data-i18n="pub.f.journal">Journal</button>
        <button class="chip" data-filter="conference" data-i18n="pub.f.conference">Conference</button>
        <button class="chip" data-filter="preprint" data-i18n="pub.f.preprint">Preprint</button>
        <button class="chip" data-filter="book" data-i18n="pub.f.book">Book / Chapter</button>
      </div>
      <span class="pubmeta" id="pub-meta"></span>
    </div>
    <div id="pub-list"></div>
  </div>
</section>

<footer class="footer">
  <div class="footer__bar" style="border:0;justify-content:center">
    <span>© <span id="year">2026</span> <span data-i18n="foot.rights">iWAN Research Group · King Saud University.</span> · <span data-i18n="foot.built">Publications auto-updated from OpenAlex.</span></span>
  </div>
</footer>

<script src="assets/js/i18n.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/publications.js"></script>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
  initPublicationsPage();
</script>
</body>
</html>
