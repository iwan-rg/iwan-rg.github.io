name: Update publications

# Refreshes data/publications.json from OpenAlex on a schedule and on demand.
on:
  schedule:
    - cron: "17 3 * * *"   # daily at 03:17 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab
  push:
    paths:
      - "data/authors.json" # re-fetch whenever the author list changes

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch publications from OpenAlex
        run: python scripts/fetch_publications.py

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain data/publications.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/publications.json
            git commit -m "chore: refresh publications from OpenAlex"
            git push
          else
            echo "No changes to publications.json"
          fi
